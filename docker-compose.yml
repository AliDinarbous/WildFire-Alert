version: "3.9"

services:
  automl:
    build:
      context: ./backend/automl
    ports:
      - "5050:5050"
    env_file:
      - .env
    environment:
      DATASET_PATH: /app/data/dataset
      MODEL_PATH: /app/data/model
    volumes:
      - ./backend/automl/data/dataset:/app/data/dataset
      - ./backend/automl/data/model:/app/data/model
    networks:
      - private-network


  api:
    build:
      context: ./backend/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./backend/automl/data/model:/app/data/model
      - ./backend/automl/data/dataset:/app/data/dataset
    depends_on:
      - db
    command: sh -c "
      sleep 5 &&
      python init_db.py &&
      python init_admin.py &&
      uvicorn main:app --host 0.0.0.0 --port 8000"
    networks:
      - private-network


  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - private-network


networks:
  private-network:
    driver: bridge

volumes:
  postgres_data:



 