version: "3.9"

services:
  automl:
    build:
      context: ./backend/automl
    ports:
      - "5050:5050"
    env_file:
      - .env
    environment:
      DATASET_PATH: /app/data/dataset
      MODEL_PATH: /app/data/model
    volumes:
      - ./backend/automl/data/dataset:/app/data/dataset
      - ./backend/automl/data/model:/app/data/model
    networks:
      - private-network


  api:
    build:
      context: ./backend/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/wildfire
      MODEL_PATH: /app/data/model
    volumes:
      - ./backend/automl/data/model:/app/data/model
    depends_on:
      - db
      - automl
    networks:
      - private-network

  db:
    image: postgres:15
    restart: always
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - private-network

networks:
  private-network:
    driver: bridge

volumes:
  postgres_data: